<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kea's Beauty Studio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .loader-container {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000000;
        }

        .loader-container video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
    </style>
</head>
<body>
    <div class="loader-container">
        <video id="logoVideo" autoplay muted playsinline>
            <source src="/spa/images/keaAssets/keaanimatelogo.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <script>
        (function() {
            const targetUrl = '/spa/index.html';
            const video = document.getElementById('logoVideo');
            let isRedirecting = false;
            let redirectTimeout = null;

            function redirectToHome() {
                if (isRedirecting) return;
                isRedirecting = true;
                
                if (redirectTimeout) clearTimeout(redirectTimeout);
                window.location.href = targetUrl;
            }

            if (video) {
                // When video ends, redirect
                video.addEventListener('ended', function() {
                    redirectToHome();
                });

                // Handle video error - redirect anyway
                video.addEventListener('error', function() {
                    console.warn('Video error, redirecting');
                    redirectToHome();
                });

                // Try to play
                const playPromise = video.play();
                if (playPromise !== undefined) {
                    playPromise.catch(function(error) {
                        console.log('Autoplay prevented:', error);
                        // Still redirect after short delay
                        setTimeout(redirectToHome, 1000);
                    });
                }
            } else {
                // No video element found
                setTimeout(redirectToHome, 1000);
            }

            // Fallback timeout - redirect after 10 seconds max
            redirectTimeout = setTimeout(function() {
                if (!isRedirecting) {
                    console.log('Timeout reached, redirecting');
                    redirectToHome();
                }
            }, 10000);
        })();
    </script>
</body>
</html>
