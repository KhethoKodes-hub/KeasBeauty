<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kea's Beauty Studio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .loader-container {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
        }

        .loader-container video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        video::-webkit-media-controls {
            display: none !important;
        }

        video {
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="loader-container">
        <video id="logoVideo" autoplay muted playsinline>
            <source src="/spa/images/keaAssets/keaanimatelogo.mp4" type="video/mp4">
        </video>
    </div>

    <script>
        (function() {
            const targetUrl = '/spa/index.html';
            const video = document.getElementById('logoVideo');
            let isRedirecting = false;
            let redirectTimeout = null;

            function redirectToHome() {
                if (isRedirecting) return;
                isRedirecting = true;
                if (redirectTimeout) clearTimeout(redirectTimeout);
                window.location.href = targetUrl;
            }

            if (video) {
                video.addEventListener('ended', redirectToHome);

                video.addEventListener('error', function() {
                    redirectToHome();
                });

                const playPromise = video.play();
                if (playPromise !== undefined) {
                    playPromise.catch(function() {
                        setTimeout(redirectToHome, 1000);
                    });
                }
            } else {
                setTimeout(redirectToHome, 1000);
            }

            // Fallback — max 10 seconds
            redirectTimeout = setTimeout(function() {
                if (!isRedirecting) redirectToHome();
            }, 10000);
        })();
    </script>
</body>
</html>
